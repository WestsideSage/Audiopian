<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Karaokee — Player</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: block; padding: 0; }

        .player-header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
        }

        .back-btn {
            width: auto;
            padding: 8px 16px;
            font-size: 0.85rem;
            margin-right: 16px;
        }

        .song-title {
            font-size: 1.1rem;
            color: #e040fb;
            font-weight: 600;
        }

        #lyrics-container {
            height: calc(100vh - 140px);
            overflow-y: scroll;
            overflow-x: hidden;
            padding: 24px;
            position: relative;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
        }

        #lyrics-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        #lyrics-scroll {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .lyric-line {
            font-size: 1.6rem;
            color: #555;
            text-align: center;
            transition: color 0.2s, font-size 0.2s;
            padding: 4px 0;
        }

        .lyric-line.active {
            color: #e040fb;
            font-size: 1.9rem;
            font-weight: 700;
        }

        .lyric-line.upcoming {
            color: #888;
        }

        #no-lyrics {
            color: #555;
            font-size: 1.2rem;
            text-align: center;
            display: none;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-btn {
            width: auto;
            padding: 8px 14px;
            font-size: 1rem;
            flex-shrink: 0;
        }

        #seek {
            flex: 1;
            accent-color: #e040fb;
        }

        #volume {
            width: 80px;
            accent-color: #e040fb;
        }

        #time-display {
            font-size: 0.85rem;
            color: #aaa;
            flex-shrink: 0;
            min-width: 90px;
            text-align: center;
        }

        /* Game mode word spans */
        .word-span {
            display: inline-block;
            color: #555;
            transition: color 0.15s;
            cursor: default;
        }

        .word-span.matched {
            color: #00e676;
        }

        .word-span.missed {
            color: #ff5252;
        }

        @keyframes confirmPulse {
            0%   { text-shadow: 0 0 0px #fff; }
            50%  { text-shadow: 0 0 8px #fff, 0 0 14px #00e676; }
            100% { text-shadow: 0 0 0px #fff; }
        }

        .word-span.asr-confirmed {
            animation: confirmPulse 0.4s ease-out;
        }

        /* Game button active state */
        .game-btn.active {
            background: #7c4dff;
            box-shadow: 0 0 8px #7c4dff88;
        }

        /* Running score in header */
        .score-display {
            margin-left: auto;
            font-size: 1rem;
            color: #00e676;
            font-weight: 600;
        }

        /* Per-line score flash */
        .line-score-flash {
            position: absolute;
            right: 24px;
            font-size: 0.85rem;
            color: #00e676;
            pointer-events: none;
            animation: fadeOut 1.2s ease forwards;
        }

        @keyframes fadeOut {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-16px); }
        }

        /* End-of-song modal */
        .game-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-modal-box {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            min-width: 280px;
        }

        .game-modal-title {
            font-size: 1.3rem;
            color: #e040fb;
            margin-bottom: 16px;
        }

        .game-modal-score {
            font-size: 3rem;
            font-weight: 700;
            color: #00e676;
            margin-bottom: 20px;
        }

        .game-modal-stats {
            color: #aaa;
            font-size: 0.95rem;
            line-height: 2;
            margin-bottom: 28px;
        }

        .game-modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* Loading overlay */
        .prep-overlay {
            position: fixed;
            inset: 0;
            background: #0d0d1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.4s;
        }

        .prep-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 40px;
        }

        .prep-song {
            font-size: 1.3rem;
            color: #e040fb;
            font-weight: 600;
            max-width: 400px;
        }

        .prep-status {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #aaa;
            font-size: 0.95rem;
        }

        .prep-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #e040fb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Debug HUD (toggle with D key) ────────────────────────── */
        #debug-hud {
            position: fixed;
            top: 60px;
            right: 0;
            width: 400px;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            background: rgba(8, 8, 18, 0.93);
            border-left: 2px solid #7c4dff;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #ccc;
            padding: 8px 10px;
            z-index: 150;
            line-height: 1.55;
        }
        #debug-hud::-webkit-scrollbar { display: none; }
        .dbg-header  { color: #7c4dff; font-weight: bold; margin-bottom: 4px; letter-spacing: 0.04em; }
        .dbg-row     { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
        .dbg-label   { color: #666; }
        .dbg-matched { color: #00e676; font-weight: bold; }
        .dbg-pending { color: #555; }
        .dbg-final   { color: #88aaff; }
        .dbg-interim { color: #ffaa00; }
        .dbg-sep     { border-top: 1px solid #2a2a4a; margin: 5px 0; }
        .dbg-ev-line  { color: #e040fb; }
        .dbg-ev-res   { color: #999; }
        .dbg-ev-match { color: #5af; }
    </style>
</head>
<body>
    <div class="prep-overlay" id="prepOverlay">
        <div class="prep-box">
            <div class="prep-song" id="prepSongTitle"></div>
            <div class="prep-status">
                <div class="prep-spinner"></div>
                <span id="prepStatus">Preparing audio…</span>
            </div>
            <button class="ctrl-btn" onclick="skipPrep()">&#9654; Skip (karaoke only)</button>
        </div>
    </div>

    <div class="player-header">
        <button class="back-btn ctrl-btn" onclick="window.location.href='/'">&#8592; Back</button>
        <div class="song-title" id="song-title">Loading...</div>
        <div class="score-display" id="score-display" style="display:none">Score: <span id="score-pct">0%</span></div>
    </div>

    <div id="lyrics-container">
        <div id="lyrics-scroll"></div>
        <div id="no-lyrics">♪ No synced lyrics available ♪</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn game-btn" id="gameBtn" onclick="toggleGameMode()">🎮 Game</button>
        <!-- vocalBtn hidden while vocal separation is disabled; restore display:'' to re-enable -->
        <button class="ctrl-btn" id="vocalBtn" onclick="toggleVocals()" style="display:none">🎤 Remove Vocals</button>
        <button class="ctrl-btn" id="skipBackBtn" onclick="skipBack()">⏮</button>
        <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" id="skipFwdBtn" onclick="skipFwd()">⏭</button>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
        <div id="time-display">0:00 / 0:00</div>
        <span style="font-size:0.8rem;color:#aaa">🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
    </div>

    <audio id="audio"></audio>

    <!-- Debug HUD — toggle with D key while Game Mode is active -->
    <div id="debug-hud" style="display:none"></div>

    <div class="game-modal" id="gameModal" style="display:none">
        <div class="game-modal-box">
            <div class="game-modal-title">🎤 Final Score</div>
            <div class="game-modal-score" id="modalScore">0%</div>
            <div class="game-modal-stats">
                <div>Words correct: <span id="modalWords">0/0</span></div>
                <div>Lines perfect: <span id="modalLines">0/0</span></div>
                <div>Best streak: <span id="modalStreak">0</span> lines</div>
            </div>
            <div class="game-modal-actions">
                <button class="ctrl-btn" onclick="replayGame()">Play Again</button>
                <button class="ctrl-btn" onclick="window.location.href='/'">Back</button>
            </div>
        </div>
    </div>

    <script src="/static/sync-helpers.js"></script>
    <script src="/static/player.js"></script>
</body>
</html>
