<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Karaokee — Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { display: block; padding: 0; }

        .player-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
        }

        .back-btn {
            width: auto;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .song-title {
            font-size: 1.05rem;
            color: var(--text);
            font-weight: 600;
            letter-spacing: -.01em;
        }

        #lyrics-container {
            height: calc(100vh - 140px);
            overflow-y: scroll;
            overflow-x: hidden;
            padding: 24px;
            position: relative;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
        }

        #lyrics-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        #lyrics-scroll {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .lyric-line {
            font-size: 1.6rem;
            color: #4b4e60;
            text-align: center;
            transition: color 0.2s, font-size 0.2s;
            padding: 4px 0;
            font-weight: 500;
        }

        .lyric-line.active {
            color: #fff;
            font-size: 1.95rem;
            font-weight: 700;
            letter-spacing: -.01em;
        }

        .lyric-line.upcoming {
            color: #6c6f82;
        }

        #no-lyrics {
            color: var(--text-faint);
            font-size: 1.2rem;
            text-align: center;
            display: none;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--line);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-btn {
            width: auto;
            padding: 8px 14px;
            font-size: 1rem;
            flex-shrink: 0;
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: var(--r-sm);
            font-weight: 600;
        }
        .ctrl-btn:hover { background: var(--surface-3); filter: none; box-shadow: inset 0 0 0 1px var(--line-strong); }
        /* compact lyric-offset chips (shown in the controls bar during a scored game) */
        .offset-btn { width: auto; flex-shrink: 0; padding: 4px 9px; font-size: 0.8rem; font-weight: 600; background: var(--surface-2); color: var(--text); border: 1px solid var(--line); border-radius: var(--r-sm); }
        .offset-btn:hover { background: var(--surface-3); filter: none; box-shadow: none; }

        #seek {
            flex: 1;
            accent-color: var(--p);
        }

        #volume {
            width: 80px;
            accent-color: var(--p);
        }

        #time-display {
            font-size: 0.85rem;
            color: var(--text-dim);
            flex-shrink: 0;
            min-width: 90px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        /* Game mode word spans */
        .word-span {
            display: inline-block;
            color: #4b4e60;
            transition: color 0.15s, text-shadow 0.15s;
            cursor: default;
        }

        .word-span.matched {
            color: var(--matched);
        }

        .word-span.matched-partial {
            color: var(--partial);
            font-weight: 600;
        }

        .word-span.missed {
            color: var(--missed);
        }

        /* Key (scored) word target cue — only on the ACTIVE line, until passed/missed. */
        .lyric-line.active .word-span.key-word:not(.matched):not(.matched-partial):not(.missed) {
            color: var(--p);
            text-shadow: 0 0 12px rgba(45,212,238,.45);
        }

        @keyframes confirmPulse {
            0%   { text-shadow: 0 0 0px #fff; }
            50%  { text-shadow: 0 0 8px #fff, 0 0 16px var(--matched); }
            100% { text-shadow: 0 0 0px #fff; }
        }

        .word-span.asr-confirmed {
            animation: confirmPulse 0.4s ease-out;
        }

        /* Game button active state */
        .game-btn.active {
            background: var(--p);
            color: #04121a;
            border-color: transparent;
            box-shadow: 0 0 12px rgba(45,212,238,.5);
        }

        /* Running score in header */
        .score-display {
            margin-left: auto;
            font-size: 1rem;
            color: var(--matched);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* ── Arcade floating HUD ─────────────────────────────────── */
        .arcade-hud {
            position: fixed; top: 74px; right: 18px; z-index: 90;
            display: flex; flex-direction: column; align-items: flex-end; gap: 7px;
            pointer-events: none; font-variant-numeric: tabular-nums;
        }
        .ah-points {
            font-size: 2.4rem; font-weight: 700; line-height: 1;
            color: transparent; background: linear-gradient(96deg,var(--p),var(--s));
            -webkit-background-clip: text; background-clip: text;
            filter: drop-shadow(0 0 14px rgba(45,212,238,.3));
            transition: transform .12s;
        }
        .ah-points.bump { transform: scale(1.16); }
        .ah-mult-row { display: flex; align-items: center; gap: 8px; }
        .ah-mult { font-size: 1.25rem; font-weight: 700; color: var(--s); }
        .ah-ramp { width: 96px; height: 7px; background: rgba(255,255,255,.1); border-radius: 999px; overflow: hidden; }
        .ah-ramp-fill { height: 100%; width: 0%; background: linear-gradient(90deg,var(--p),var(--s)); transition: width .2s; }
        .ah-streak { font-size: 1rem; color: var(--fire-b); font-weight: 700; }
        .ah-fire {
            font-size: 0.8rem; font-weight: 800; letter-spacing: .18em;
            color: #fff; background: linear-gradient(95deg,var(--fire-a),var(--fire-b));
            padding: 3px 12px; border-radius: 8px; box-shadow: 0 0 18px rgba(255,84,112,.5);
            animation: firePulse 0.7s ease-in-out infinite alternate;
        }
        @keyframes firePulse { from { box-shadow: 0 0 10px rgba(255,84,112,.5); } to { box-shadow: 0 0 22px rgba(255,159,69,.85); } }

        /* On Fire — bold active-line treatment; lyrics stay readable. */
        body.arcade-onfire .lyric-line.active {
            background: linear-gradient(90deg,var(--fire-a),var(--fire-b),#ffd24a);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
            text-shadow: 0 0 18px rgba(255,152,0,.4);
        }
        /* In Game Mode the active line is per-word spans; keep each word's OWN colour
           (key-word cyan, matched green, partial amber, missed red) during ON FIRE rather
           than letting the line's gradient fill mask them — so the scoring stays readable
           on a streak. A warm glow keeps the fire energy; the key-word cue's own cyan glow
           still wins via specificity, so key words stay distinct. */
        body.arcade-onfire .lyric-line.active .word-span {
            -webkit-text-fill-color: currentColor;
            text-shadow: 0 0 14px rgba(255,120,40,.45);
        }
        body.arcade-onfire #lyrics-container::after {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
            box-shadow: inset 0 -120px 120px -90px rgba(255,106,0,.6), inset 0 120px 120px -90px rgba(255,106,0,.38);
        }

        .diff-pill {
            font-size: 0.62rem; color: var(--p); background: var(--p-soft);
            border: 1px solid var(--p-line); border-radius: 7px; padding: 3px 10px;
            font-weight: 700; letter-spacing: .14em; text-transform: uppercase; margin-left: 10px;
        }
        .diff-select { display: inline-flex; border: 1px solid var(--line); border-radius: var(--r-sm); overflow: hidden; flex-shrink: 0; }
        .diff-select button {
            width: auto; padding: 6px 10px; font-size: 0.8rem; background: var(--surface-2);
            color: var(--text-dim); border: none; border-right: 1px solid var(--line); cursor: pointer; border-radius: 0;
        }
        .diff-select button:last-child { border-right: none; }
        .diff-select button.active { background: var(--p); color: #04121a; }
        .diff-select.locked { opacity: .55; }
        .diff-select.locked button { cursor: not-allowed; }

        /* Per-line score flash */
        .line-score-flash {
            position: absolute;
            right: 24px;
            font-size: 0.85rem;
            color: var(--matched);
            font-weight: 700;
            pointer-events: none;
            animation: fadeOut 1.2s ease forwards;
        }

        @keyframes fadeOut {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-16px); }
        }

        /* End-of-song modal */
        .game-modal {
            position: fixed;
            inset: 0;
            background: rgba(5,6,12,0.8);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .game-modal-box {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--r-lg);
            padding: 40px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 24px 70px rgba(0,0,0,.6);
        }

        .game-modal-title {
            font-size: 1.3rem;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 16px;
        }

        .game-modal-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--matched);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .game-modal-stats {
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 2;
            margin-bottom: 28px;
        }

        /* ── Grade-hero end screen ───────────────────────────────── */
        .grade-hero { position: relative; margin-bottom: 22px; }
        .grade-letter {
            font-size: 5rem; font-weight: 700; line-height: 1; letter-spacing: -.02em;
            background: linear-gradient(135deg,var(--p),var(--s) 60%,var(--matched));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; color: transparent;
        }
        .grade-points { font-size: 1.6rem; font-weight: 800; color: var(--matched); margin-top: 4px; font-variant-numeric: tabular-nums; }
        .grade-stats { color: var(--text-dim); font-size: 0.9rem; line-height: 1.9; margin-top: 14px; }
        .grade-stats span { color: var(--text); font-weight: 700; }
        .nb-ribbon {
            position: absolute; top: -10px; right: -10px; transform: rotate(8deg);
            background: linear-gradient(95deg,var(--fire-a),var(--fire-b)); color: #fff;
            font-weight: 800; font-size: 0.7rem; letter-spacing: .12em;
            padding: 4px 10px; border-radius: 8px; box-shadow: 0 0 14px rgba(255,84,112,.6);
        }

        .game-modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        /* Loading overlay */
        .prep-overlay {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(120% 80% at 100% 0%, rgba(240,70,143,.12), transparent 56%),
                radial-gradient(120% 90% at 0% 100%, rgba(45,212,238,.12), transparent 56%),
                var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.4s;
        }

        .prep-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 40px;
        }

        .prep-song {
            font-size: 1.3rem;
            color: var(--text);
            font-weight: 700;
            max-width: 400px;
        }

        .diff-gate { display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .diff-gate-label { font-size: 1rem; color: var(--text-dim); letter-spacing: .04em; }
        .diff-gate-cards { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
        .diff-card {
            width: 150px; padding: 18px 14px; background: var(--surface); color: var(--text);
            border: 1px solid var(--line); border-radius: var(--r); cursor: pointer;
            display: flex; flex-direction: column; gap: 6px; align-items: center;
            transition: transform .12s, border-color .12s, box-shadow .12s;
        }
        .diff-card:hover, .diff-card:focus-visible {
            transform: translateY(-3px); border-color: var(--p); box-shadow: 0 0 16px rgba(45,212,238,.3); outline: none;
        }
        .diff-card .dc-name { font-size: 1.15rem; font-weight: 700; color: #fff; }
        .diff-card .dc-desc { font-size: 0.75rem; color: var(--text-dim); text-align: center; line-height: 1.3; }
        .diff-card.selected { border-color: var(--s); box-shadow: 0 0 18px rgba(240,70,143,.45); }
        .diff-gate-listen { width: auto; padding: 8px 16px; font-size: 0.85rem; opacity: .8; }
        .diff-preview { max-width: 560px; margin: 2px auto 0; text-align: center; }
        .dp-line { font-size: 1.15rem; line-height: 1.8; }
        .dp-word { color: #4b4e60; transition: color .15s; }
        .dp-word.dp-anchor { color: var(--text-dim); }
        .dp-word.dp-target { color: #fff; font-weight: 700; text-shadow: 0 0 8px var(--p), 0 0 14px rgba(45,212,238,.5); }
        .dp-caption { margin-top: 8px; font-size: 0.78rem; color: var(--text-dim); letter-spacing: .02em; }

        .prep-status {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .prep-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--line-strong);
            border-top-color: var(--p);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Debug HUD (toggle with D key) ────────────────────────── */
        #debug-hud {
            position: fixed;
            top: 60px;
            right: 0;
            width: 400px;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            background: rgba(7, 7, 16, 0.94);
            border-left: 2px solid var(--p);
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #ccc;
            padding: 8px 10px;
            z-index: 150;
            line-height: 1.55;
        }
        #debug-hud::-webkit-scrollbar { display: none; }
        .dbg-header  { color: var(--p); font-weight: bold; margin-bottom: 4px; letter-spacing: 0.04em; }
        .dbg-row     { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
        .dbg-label   { color: #666; }
        .dbg-matched { color: var(--matched); font-weight: bold; }
        .dbg-pending { color: #555; }
        .dbg-final   { color: #88aaff; }
        .dbg-interim { color: var(--partial); }
        .dbg-sep     { border-top: 1px solid var(--line); margin: 5px 0; }
        .dbg-ev-line  { color: var(--s); }
        .dbg-ev-res   { color: #999; }
        .dbg-ev-match { color: #5af; }

        #ytplayer-wrap { border: 1px solid var(--line); box-shadow: 0 12px 30px rgba(0,0,0,.5); }
        /* The YouTube iframe must fill its wrap exactly — never overflow/clip — or YouTube
           treats the player as off-screen and pauses playback after a few seconds. */
        #ytplayer-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
    </style>
</head>
<body>
    <div class="prep-overlay" id="prepOverlay">
        <div class="prep-box">
            <div class="prep-song" id="prepSongTitle"></div>
            <div class="diff-gate" id="diffGate" role="group" aria-label="Choose difficulty">
                <div class="diff-gate-label">Choose your difficulty</div>
                <div class="diff-gate-cards" id="diffGateCards">
                    <button class="diff-card" data-diff="easy"><span class="dc-name">Easy</span><span class="dc-desc">Forgiving — a few key words</span></button>
                    <button class="diff-card" data-diff="medium"><span class="dc-name">Medium</span><span class="dc-desc">Balanced</span></button>
                    <button class="diff-card" data-diff="hard"><span class="dc-name">Hard</span><span class="dc-desc">Strict words &amp; timing</span></button>
                    <button class="diff-card" data-diff="expert"><span class="dc-name">Expert</span><span class="dc-desc">Nearly every word, tight</span></button>
                </div>
                <div class="diff-preview" id="diffPreview" style="display:none">
                    <div class="dp-line" id="dpLine"></div>
                    <div class="dp-caption" id="dpCaption"></div>
                </div>
                <div class="prep-status">
                    <div class="prep-spinner"></div>
                    <span id="prepStatus">Preparing audio…</span>
                </div>
                <button class="diff-gate-listen ctrl-btn" onclick="justListen()">Just listen — no scoring</button>
            </div>
        </div>
    </div>

    <div class="player-header">
        <button class="back-btn ctrl-btn" onclick="window.location.href='/'">&#8592; Back</button>
        <div class="song-title" id="song-title">Loading...</div>
        <div class="score-display" id="score-display" style="display:none">Score: <span id="score-pct">0%</span></div>
        <div class="diff-pill" id="diff-pill" style="display:none">MEDIUM</div>
    </div>

    <div class="arcade-hud" id="arcadeHud" style="display:none" aria-hidden="true">
        <div class="ah-points" id="ahPoints">0</div>
        <div class="ah-mult-row">
            <span class="ah-mult" id="ahMult">1&#215;</span>
            <div class="ah-ramp"><div class="ah-ramp-fill" id="ahRampFill"></div></div>
        </div>
        <div class="ah-streak" id="ahStreak" style="visibility:hidden">&#128293; <span id="ahStreakVal">0</span></div>
        <div class="ah-fire" id="ahFire" style="display:none">ON FIRE</div>
    </div>

    <div id="lyrics-container">
        <div id="lyrics-scroll"></div>
        <div id="no-lyrics">♪ No synced lyrics available ♪</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn game-btn" id="gameBtn" onclick="toggleGameMode()">🎮 Game</button>
        <button class="ctrl-btn" id="skipBackBtn" onclick="skipBack()">⏮</button>
        <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" id="skipFwdBtn" onclick="skipFwd()">⏭</button>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
        <div id="time-display">0:00 / 0:00</div>
        <span style="font-size:0.8rem;color:#aaa">🔊</span>
        <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
        <div id="asr-provider-display" style="font-size:0.78rem;color:#aaa;min-width:190px;text-align:left;">ASR: checking...</div>
        <div id="lrc-offset-control" style="display:none; align-items:center; gap:6px; font-size:13px; color:#aaa;">
          <span>Lyrics offset</span>
          <button id="offsetMinus" class="offset-btn" title="Shift lyrics earlier">−0.5s</button>
          <span id="offsetDisplay">0.0s</span>
          <button id="offsetPlus"  class="offset-btn" title="Shift lyrics later">+0.5s</button>
        </div>
    </div>

    <audio id="audio"></audio>
    <!-- YouTube IFrame mount. MUST stay visible AND mostly on-screen: YouTube auto-pauses
         players that are hidden/clipped/mostly-off-screen after a few seconds. The iframe is
         forced to FILL this box (see #ytplayer-wrap iframe rule), so it never overflows/clips. -->
    <div id="ytplayer-wrap" style="position:fixed; right:12px; bottom:72px; width:320px; height:180px; z-index:80; border-radius:8px; overflow:hidden; background:#000;">
        <div id="ytplayer"></div>
    </div>

    <!-- Debug HUD — toggle with D key while Game Mode is active -->
    <div id="debug-hud" style="display:none"></div>

    <div class="game-modal" id="gameModal" style="display:none">
        <div class="game-modal-box">
            <div class="grade-hero" id="gradeHero" style="display:none">
                <div class="nb-ribbon" id="nbRibbon" style="display:none">NEW BEST</div>
                <div class="grade-letter" id="gradeLetter">A</div>
                <div class="grade-points"><span id="gradePoints">0</span> pts</div>
                <div class="grade-stats">
                    <div>Accuracy <span id="gradeAcc">0%</span></div>
                    <div>Max combo <span id="gradeCombo">1&#215;</span></div>
                    <div>Longest streak <span id="gradeStreak">0</span></div>
                    <div>Perfects <span id="gradePerfects">0</span></div>
                    <div>Difficulty <span id="gradeDiff">MEDIUM</span></div>
                    <div>High score <span id="gradeHiscore">0</span></div>
                </div>
            </div>
            <div class="game-modal-actions">
                <button class="ctrl-btn" onclick="replayGame()">Play Again</button>
                <button class="ctrl-btn" id="shareImgBtn" style="display:none">Share image</button>
                <button class="ctrl-btn" onclick="window.location.href='/'">Back</button>
            </div>
        </div>
    </div>

    <script src="/static/sync-helpers.js"></script>
    <script src="/static/vad-helpers.js"></script>
    <script src="/static/match-helpers.js"></script>
    <script src="/static/scoring.js"></script>
    <script src="/static/phrase-engine.js"></script>
    <script src="/static/realtime-whisper.js"></script>
    <script src="/static/scoring-arcade.js"></script>
    <script src="/static/telemetry-helpers.js"></script>
    <script src="/static/lyric-paint-helpers.js"></script>
    <script src="/static/scoring-session.js"></script>
    <script src="/static/commit-helpers.js"></script>
    <script src="/static/playback-source.js"></script>
    <script src="/static/youtube-source.js"></script>
    <script src="/static/playback-gate.js"></script>
    <script src="/static/vendor/vad/ort.wasm.min.js"></script>
    <script src="/static/vendor/vad/bundle.min.js"></script>
    <script src="/static/key-store.js"></script>
    <script src="/static/share-card.js"></script>
    <script src="/static/player.js"></script>
</body>
</html>
